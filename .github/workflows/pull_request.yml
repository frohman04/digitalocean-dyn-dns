on:
  pull_request:
    branches: [ master ]

jobs:
  lint:
    name: lints
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          components: clippy, rustfmt

      - uses: kunobi-ninja/kache-action@v1
      - name: rustfmt
        uses: actions-rs/cargo@v1
        with:
          command: fmt
          args: --all -- --check
      - name: cargo check
        uses: actions-rs/cargo@v1
        with:
          command: check
      - uses: actions-rs/clippy-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          args: --all-features

  test:
    name: tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - uses: kunobi-ninja/kache-action@v1
      - name: test
        uses: actions-rs/cargo@v1
        with:
          command: test
